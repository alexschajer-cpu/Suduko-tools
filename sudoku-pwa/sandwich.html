<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f" id="theme-meta">
<title>Sandwich Candidates</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #181818; --surface2: #222222;
    --border: #2e2e2e; --border-bright: #444;
    --text: #e8e4dc; --text-dim: #6a6660; --text-mid: #9a9590;
    --accent: #d4a84b; --green: #5a9e6f; --green-dim: rgba(90,158,111,0.15);
    --red: #b85450; --red-dim: rgba(184,84,80,0.15);
    --blue: #4e8fc0; --blue-dim: rgba(78,143,192,0.13);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  :root.light {
    --bg: #f0ede6; --surface: #faf8f4; --surface2: #f0ede6;
    --border: #dedad2; --border-bright: #c4bfb5;
    --text: #1a1916; --text-dim: #9a9588; --text-mid: #6a6660;
    --accent: #b8860b; --green: #2e7d4f; --green-dim: rgba(46,125,79,0.12);
    --red: #a33430; --red-dim: rgba(163,52,48,0.12);
    --blue: #2a6a9e; --blue-dim: rgba(42,106,158,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px 16px calc(24px + var(--safe-bottom));
  }
  .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }

  .nav-bar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 4px; }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
    color: var(--text-mid); cursor: pointer; display: flex; align-items: center; gap: 5px;
    text-decoration: none;
  }
  .back-btn:active { opacity: 0.7; }
  .page-title { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); }
  .theme-toggle {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--text-mid); display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .theme-toggle:active { opacity: 0.7; }

  .heading { font-size: 1.25rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .heading span { color: var(--accent); }
  .heading-row { display: flex; align-items: baseline; gap: 10px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }

  .explainer {
    font-size: 0.68rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 16px;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; border-left: 3px solid var(--accent);
  }
  .explainer strong { color: var(--accent); font-weight: 500; }
  .bread {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 3px; font-size: 0.7rem; font-weight: 700;
    vertical-align: middle; margin: 0 1px;
    background: var(--red-dim); border: 1px solid var(--red); color: var(--red);
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); padding-left: 2px; }
  .input-with-reset { display: flex; align-items: stretch; }
  .input-with-reset input { border-radius: 6px 0 0 6px; flex: 1; min-width: 0; }
  .reset-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; width: 42px;
    background: var(--surface2); border: 1px solid var(--border); border-left: none;
    border-radius: 0 6px 6px 0; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .reset-btn:active { background: var(--border); color: var(--text); }
  input[type=number] {
    font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 700;
    width: 100%; padding: 12px 14px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); border-radius: 6px; outline: none;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { border-color: var(--accent); }
  input[type=number].invalid { border-color: var(--red) !important; }

  .digit-section-label {
    font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px; padding-left: 2px; margin-top: 16px;
  }
  .digit-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 10px; }
  .digit-btn {
    aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-mid); font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.9rem, 3.5vw, 1.1rem); font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
    min-height: 48px; -webkit-user-select: none; user-select: none;
  }
  .digit-btn:active { transform: scale(0.91); }
  .digit-btn.must { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .digit-btn.cannot { background: var(--red-dim); border-color: var(--red); color: var(--red); text-decoration: line-through; }
  .digit-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .legend-pill {
    font-size: 0.58rem; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 20px;
    border: 1px solid; display: flex; align-items: center; gap: 4px;
  }
  .legend-pill.green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .legend-pill.red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .legend-pill.neutral { border-color: var(--border-bright); color: var(--text-dim); }
  .reset-link {
    font-size: 0.62rem; color: var(--text-dim); cursor: pointer; text-decoration: underline;
    text-underline-offset: 3px; padding: 4px 2px; display: inline-block;
  }
  .reset-link:active { color: var(--text-mid); }

  .results-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .results-header { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .results-title { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .results-count { font-size: 0.72rem; color: var(--accent); font-weight: 500; }
  .results-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
  .no-results { font-size: 0.78rem; color: var(--text-dim); padding: 12px 0 4px; text-align: center; line-height: 1.6; }
  .error-msg { font-size: 0.75rem; color: var(--red); padding: 12px 0 4px; line-height: 1.5; }
  .length-group { display: flex; flex-direction: column; gap: 8px; }
  .length-header { display: flex; align-items: center; gap: 8px; }
  .length-badge {
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px; border: 1px solid var(--blue);
    color: var(--blue); background: var(--blue-dim); white-space: nowrap; flex-shrink: 0;
  }
  .length-divider { flex: 1; height: 1px; background: var(--border); }
  .length-combo-count { font-size: 0.6rem; color: var(--text-dim); white-space: nowrap; }
  .combo-row { display: flex; align-items: center; animation: fadeIn 0.12s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
  .combo-digits { display: flex; gap: 4px; flex-wrap: wrap; }
  .combo-chip {
    width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 1rem; font-weight: 500;
    border: 1px solid var(--border); color: var(--text-mid); background: var(--surface2);
  }
  .combo-chip.must-digit { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .summary-section { padding-top: 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .summary-label { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .unique-digits { display: flex; gap: 4px; flex-wrap: wrap; }
  .unique-chip {
    width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 0.9rem; font-weight: 500; border: 1px solid;
  }
  .unique-chip.always { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .unique-chip.possible { background: var(--surface2); border-color: var(--border); color: var(--text-mid); }
  .unique-chip.never { background: transparent; border-color: var(--border); color: #3a3a3a; text-decoration: line-through; }
  .hint {
    font-size: 0.68rem; color: var(--text-dim); line-height: 1.7; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 4px; border-left: 3px solid var(--accent);
  }
  .hint strong { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>
<div class="app">

  <div class="nav-bar">
    <div class="nav-left">
      <a href="index.html" class="back-btn">‹ Back</a>
      <span class="page-title">Sandwich Sudoku</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <div class="heading-row">
    <div class="heading">Sandwich <span>Candidates</span></div>
  </div>

  <div class="card">
    <div class="explainer">
      Digits between the <span class="bread">1</span> and <span class="bread">9</span> must sum to the given total. Only digits <strong>2&ndash;8</strong> are valid fillers. Results are grouped by length.
    </div>
    <div class="field">
      <label>Sandwich Total</label>
      <div class="input-with-reset">
        <input type="number" id="total" min="0" max="35" placeholder="15"
               inputmode="numeric" pattern="[0-9]*" oninput="calculate()">
        <button class="reset-btn" onclick="resetField('total')" title="Clear">&#x2715;</button>
      </div>
    </div>
    <div class="digit-section-label">Digit filters (2&ndash;8)</div>
    <div class="digit-row" id="digit-btns"></div>
    <div class="digit-legend">
      <span class="legend-pill green">&#10003; must include</span>
      <span class="legend-pill red">&#x2715; cannot include</span>
      <span class="legend-pill neutral">tap to cycle</span>
    </div>
    <span class="reset-link" onclick="resetDigits()">clear all digit filters</span>
  </div>

  <div class="results-card">
    <div class="results-header">
      <span class="results-title">Combinations</span>
      <span class="results-count" id="results-count"></span>
    </div>
    <div class="results-body" id="results-body">
      <div class="no-results">Enter a sandwich total above.</div>
    </div>
  </div>

</div>
<script>
const DIGITS = [2,3,4,5,6,7,8];
const digitState = Array(10).fill(0);
let isLight = false;

function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('theme-icon').textContent = isLight ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
  document.getElementById('theme-meta').setAttribute('content', isLight ? '#f0ede6' : '#0f0f0f');
  try { localStorage.setItem('sk-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
try { if (localStorage.getItem('sk-theme') === 'light') toggleTheme(); } catch(e) {}

function initDigitBtns() {
  const row = document.getElementById('digit-btns');
  for (const d of DIGITS) {
    const btn = document.createElement('button');
    btn.className = 'digit-btn'; btn.textContent = d; btn.dataset.d = d;
    btn.addEventListener('click', () => { digitState[d]=(digitState[d]+1)%3; updateDigitBtn(d); calculate(); });
    row.appendChild(btn);
  }
}
function updateDigitBtn(d) {
  const btn = document.querySelector(`.digit-btn[data-d="${d}"]`);
  btn.classList.remove('must','cannot');
  if(digitState[d]===1) btn.classList.add('must');
  else if(digitState[d]===2) btn.classList.add('cannot');
}
function resetDigits() { for(const d of DIGITS){digitState[d]=0;updateDigitBtn(d);} calculate(); }
function resetField(id) { const el=document.getElementById(id); el.value=''; el.classList.remove('invalid'); calculate(); }

function calculate() {
  const totalEl=document.getElementById('total');
  const body=document.getElementById('results-body'), countEl=document.getElementById('results-count');
  totalEl.classList.remove('invalid');
  const rawVal=totalEl.value.trim();
  if(rawVal===''){body.innerHTML='<div class="no-results">Enter a sandwich total above.</div>';countEl.textContent='';return;}
  const parsedTotal=parseInt(rawVal);
  if(isNaN(parsedTotal)||parsedTotal<0||parsedTotal>35){totalEl.classList.add('invalid');body.innerHTML='<div class="error-msg">Total must be 0&ndash;35.</div>';countEl.textContent='!';return;}
  if(parsedTotal===0){countEl.textContent='1 combo';body.innerHTML=`<div class="length-group"><div class="length-header"><span class="length-badge">0 cells</span><div class="length-divider"></div><span class="length-combo-count">1 combo</span></div><div class="combo-row"><span style="font-size:0.75rem;color:var(--text-dim)">(no digits between 1 and 9)</span></div></div>`;return;}
  const mustHave=[], cannotHave=new Set();
  for(const d of DIGITS){if(digitState[d]===1)mustHave.push(d);if(digitState[d]===2)cannotHave.add(d);}
  for(const d of mustHave){if(cannotHave.has(d)){body.innerHTML=`<div class="error-msg">Conflict: ${d} is marked both must and cannot.</div>`;countEl.textContent='!';return;}}
  const available=DIGITS.filter(d=>!cannotHave.has(d));
  const byLength={};
  function gen(startIdx,chosen,sum){
    if(sum===parsedTotal){const len=chosen.length;if(!byLength[len])byLength[len]=[];byLength[len].push([...chosen]);return;}
    for(let i=startIdx;i<available.length;i++){const d=available[i],newSum=sum+d;if(newSum>parsedTotal)break;gen(i+1,[...chosen,d],newSum);}
  }
  gen(0,[],0);
  const allCombos=[];
  for(const len in byLength){byLength[len]=byLength[len].filter(c=>mustHave.every(d=>c.includes(d)));allCombos.push(...byLength[len]);}
  const totalCount=allCombos.length;
  countEl.textContent=totalCount===0?'none':`${totalCount} combo${totalCount!==1?'s':''}`;
  if(totalCount===0){body.innerHTML='<div class="no-results">No combinations match your constraints.</div>';return;}
  const alwaysPresent=[],sometimesPresent=[];
  for(const d of DIGITS){if(cannotHave.has(d))continue;const inAll=allCombos.every(c=>c.includes(d)),inSome=allCombos.some(c=>c.includes(d));if(inAll)alwaysPresent.push(d);else if(inSome)sometimesPresent.push(d);}
  let html='';
  const lengths=Object.keys(byLength).map(Number).sort((a,b)=>a-b);
  for(const len of lengths){const combos=byLength[len];if(!combos||combos.length===0)continue;html+=`<div class="length-group"><div class="length-header"><span class="length-badge">${len} cell${len!==1?'s':''}</span><div class="length-divider"></div><span class="length-combo-count">${combos.length} combo${combos.length!==1?'s':''}</span></div>`;for(const combo of combos){const chips=combo.map(d=>`<div class="${alwaysPresent.includes(d)?'combo-chip must-digit':'combo-chip'}">${d}</div>`).join('');html+=`<div class="combo-row"><div class="combo-digits">${chips}</div></div>`;}html+=`</div>`;}
  html+=`<div class="summary-section"><div class="summary-label">Digit summary (across all lengths)</div><div class="unique-digits">`;
  for(const d of DIGITS){let cls=cannotHave.has(d)||(!alwaysPresent.includes(d)&&!sometimesPresent.includes(d))?'unique-chip never':alwaysPresent.includes(d)?'unique-chip always':'unique-chip possible';html+=`<div class="${cls}">${d}</div>`;}
  html+=`</div></div>`;
  const lenWords=lengths.map(l=>`${l} cell${l!==1?'s':''}`);
  const lenSummary=lenWords.length===1?lenWords[0]:lenWords.slice(0,-1).join(', ')+' or '+lenWords[lenWords.length-1];
  html+=`<div class="hint"><strong>Possible lengths:</strong> ${lenSummary}.</div>`;
  if(alwaysPresent.length>0)html+=`<div class="hint"><strong>Always present:</strong> ${alwaysPresent.join(', ')} appear in every valid combination.</div>`;
  body.innerHTML=html;
}

initDigitBtns();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
