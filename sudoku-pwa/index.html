<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f" id="theme-meta">
<title>Sudoku Candidates</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --border-bright: #444;
    --text: #e8e4dc;
    --text-dim: #6a6660;
    --text-mid: #9a9590;
    --accent: #d4a84b;
    --green: #5a9e6f;
    --blue: #4e8fc0;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  :root.light {
    --bg: #f0ede6; --surface: #faf8f4; --surface2: #f0ede6;
    --border: #dedad2; --border-bright: #c4bfb5;
    --text: #1a1916; --text-dim: #9a9588; --text-mid: #6a6660;
    --accent: #b8860b; --green: #2e7d4f; --blue: #2a6a9e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 20px calc(32px + var(--safe-bottom));
  }
  .app { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .wordmark { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
  .theme-toggle {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--text-mid); display: flex; align-items: center; gap: 6px;
  }
  .theme-toggle:active { opacity: 0.7; }

  .hero { text-align: center; padding: 8px 0 24px; }
  .icon-mark {
    width: 64px; height: 64px; background: var(--accent); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 700; color: #0f0f0f; margin: 0 auto 16px;
    letter-spacing: -0.04em;
  }
  .hero-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .hero-title span { color: var(--accent); }
  .hero-sub { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

  .tool-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; text-decoration: none; color: inherit;
    transition: border-color 0.15s, background-color 0.2s;
  }
  .tool-card:active { background: var(--surface2); border-color: var(--border-bright); }

  .tool-icon {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; font-weight: 700; flex-shrink: 0;
  }
  .tool-icon.cage { background: rgba(212,168,75,0.15); color: var(--accent); border: 1px solid rgba(212,168,75,0.3); }
  .tool-icon.sandwich { background: rgba(78,143,192,0.13); color: var(--blue); border: 1px solid rgba(78,143,192,0.25); }

  .tool-text { flex: 1; }
  .tool-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 3px; }
  .tool-desc { font-size: 0.65rem; color: var(--text-dim); line-height: 1.5; letter-spacing: 0.01em; }

  .tool-arrow { color: var(--text-dim); font-size: 1rem; }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <span class="wordmark">Sudoku Tools</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <div class="hero">
    <div class="icon-mark">S</div>
    <div class="hero-title">Sudoku <span>Candidates</span></div>
    <div class="hero-sub">Killer &amp; Sandwich helper</div>
  </div>

  <a href="cage.html" class="tool-card">
    <div class="tool-icon cage">#</div>
    <div class="tool-text">
      <div class="tool-name">Cage Calculator</div>
      <div class="tool-desc">Find all digit combinations for a given cage total and cell count.</div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

  <a href="sandwich.html" class="tool-card">
    <div class="tool-icon sandwich">⊟</div>
    <div class="tool-text">
      <div class="tool-name">Sandwich Calculator</div>
      <div class="tool-desc">Find filling digits between 1 and 9 that sum to a given total.</div>
    </div>
    <span class="tool-arrow">›</span>
  </a>

</div>

<script>
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  document.getElementById('theme-icon').textContent = isLight ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
  document.getElementById('theme-meta').setAttribute('content', isLight ? '#f0ede6' : '#0f0f0f');
  try { localStorage.setItem('sk-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
try { if (localStorage.getItem('sk-theme') === 'light') toggleTheme(); } catch(e) {}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
